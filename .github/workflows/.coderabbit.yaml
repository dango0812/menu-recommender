language: ko-KR
reviews:
  # true: 리뷰어가 변경 요청(Request Changes)을 직접 걸 수 있도록 허용
  # false일 경우 코멘트만 남기고, 변경 요청 상태로 전환하지 않음
  request_changes_workflow: true

  # 자동 리뷰 설정
  auto_review:
    enabled: true
    drafts: true
    # 리뷰를 진행할 브랜치
    base_branches:
      - .*
    # PR이 업데이트될 때 변경된 부분만 리뷰
    auto_incremental_review: true

  # 리뷰 톤 설정 (chill: 부드러운 톤, assertive: 단호한 톤)
  profile: 'chill'

  # 리뷰에서 제외할 파일/폴더 패턴 (! 접두사 사용)
  path_filters:
    - '!**/node_modules/**'
    - '!**/.github/**'
    - '!**/.vscode/**'
    - '!**/public/**'
    - '!**/*.md'
    - '!**/*.json'
    - '!**/pnpm-lock.yaml'
    - '!**/migrations/**'

  # 리뷰 가이드라인
  path_instructions:
    - path: '**/*.{ts,tsx,js,jsx}'
      instructions: |
        ## 1. 일반적인 코딩 컨벤션

        ### 가독성
        - 매직 넘버 지양, 의미있는 상수 사용
        - 함수는 하나의 책임만 가지도록 작성 (최대 20줄 권장)
        - 중첩 깊이 최소화 (3단계 이하 권장)
        - 조건부 렌더링 시 && 대신 삼항 연산자 사용 (falsy 값 렌더링 방지)

        ### Import 규칙
        - 외부 디렉토리 참조 시 @/* path alias 절대 경로 사용
        - 동일 디렉토리 또는 하위 디렉토리 파일은 상대 경로 사용
        - simple-import-sort 플러그인에 의한 자동 정렬 준수

        ### Barrel Export 규칙
        - 디렉토리 단위 모듈은 index.ts를 통해 barrel export 사용
        - 단, 트리쉐이킹이 필요한 경우 직접 import를 우선 고려

        ## 2. Next.js App Router

        ### Server Component vs Client Component
        - 모든 page.tsx, layout.tsx는 기본적으로 Server Component로 작성
        - 상태 관리, 이벤트 처리, 브라우저 API 사용이 필요한 경우에만 Client Component로 분리
        - Client Component의 크기를 최소화하고, 무거운 로직이나 데이터 페칭은 Server에서 처리 후 props로 전달
        - Server Component에서만 사용되는 모듈은 'server-only' 패키지로 보호

        ### 데이터 페칭 및 Server Actions
        - 데이터 변형(Mutation)은 Server Actions ('use server')를 통해 처리
        - 서버 데이터 페칭은 Server Component에서 직접 async/await 사용
        - 클라이언트 데이터 페칭 및 캐싱은 Tanstack Query 사용

        ### 라우팅
        - Route Group (괄호 폴더)으로 레이아웃을 논리적으로 구분
        - layout.tsx에서 공통 레이아웃과 메타데이터 관리
        - loading.tsx, error.tsx, not-found.tsx 등 규약 파일 적극 활용

        ## 3. React 19 & React Compiler

        ### React Compiler
        - React Compiler(babel-plugin-react-compiler)가 활성화되어 있으므로 수동 memo, useCallback, useMemo 사용 불필요 (컴파일러가 자동 메모이제이션 최적화)
        - 수동 메모이제이션이 있으면 오히려 컴파일러 최적화를 방해할 수 있으므로 제거 권장

        ### React 19
        - forwardRef 불필요, ref를 props로 직접 전달
        - useActionState, useFormStatus 등 React 19 내장 훅 활용
        - use() 훅으로 Promise/Context 소비 가능

        ### 컴포넌트 작성
        - 컴포넌트는 단일 책임 원칙 준수
        - JSX 내에서 복잡한 로직 지양, 별도의 핸들러 함수로 분리
        - 렌더링마다 재생성되지 않아도 되는 정적 JSX나 상수는 컴포넌트 외부로 호이스팅
        - 무거운 클라이언트 컴포넌트는 next/dynamic으로 동적 import 처리

        ## 4. 상태 관리
        - 서버 상태 (캐싱/리페치): Tanstack Query 사용
        - 폼 상태: react-hook-form + zod + zodResolver로 관리
        - 에러 처리: Error Boundary와 try-catch 또는 onError 콜백 활용

        ## 5. 폼 & 유효성 검사 (react-hook-form + zod)
        - zodResolver를 통해 스키마 기반 유효성 검사 적용
        - defaultValues는 useForm에서 명시적으로 설정 (z.default()와 혼용 지양)
        - Controller 또는 RHF 래퍼 컴포넌트(RHFInput 등)를 사용하여 커스텀 UI와 연동
        - useFieldArray로 동적 필드 배열 관리
        - form.setError / form.clearErrors로 서버 에러 핸들링

        ## 6. 스타일링 (Tailwind CSS v4 + CVA)
        - 컴포넌트 변형(variants)은 class-variance-authority(CVA)로 관리
        - 클래스 충돌 해소는 tailwind-merge의 cn() 유틸 사용
        - @theme 블록에서 커스텀 토큰 정의 (--color-primary 등)
        - @layer base → @layer components 순서로 스타일 우선순위 관리
        - tailwind-merge v3에서 커스텀 테마 컬러가 충돌 시 드롭될 수 있으므로 동일 cn() 호출 내 혼용 주의

        ## 7. 타입스크립트
        - strict 모드 사용
        - 타입 명시적으로 작성 (any 사용 지양)
        - as const 배열로 리터럴 타입 관리 후 z.enum()과 연계
        - 제네릭을 활용한 타입 안전한 컴포넌트 작성 (예: RHFInput<T>)

        ## 8. 성능 최적화
        - next/image 컴포넌트로 이미지 최적화 (fill + sizes, 적절한 포맷)
        - next/dynamic으로 무거운 클라이언트 컴포넌트 지연 로딩 (Lottie, 에디터 등)
        - Prisma 쿼리 시 select/include로 필요한 필드만 조회
        - Tanstack Query의 staleTime, gcTime 적절히 설정하여 불필요한 리페치 방지

        ## 10. 기타 가이드라인
        - 충분한 근거와 함께 리뷰 제공
        - 정보 검증 후 답변
        - 간결하고 명확한 응답
        - 필요시 추가 컨텍스트 요청
        - 검증되지 않은 주장 지양
        - 한국어로 응답
        - ES6+ 기능 적극 활용

    - path: '**/*.prisma'
      instructions: |
        ## Prisma 스키마 가이드라인
        - 모델명은 PascalCase, 필드명은 camelCase 사용
        - @map / @@map으로 DB 테이블/컬럼명과 코드 네이밍 분리 가능
        - 관계 필드에는 반드시 @relation 명시
        - 인덱스(@index)와 유니크 제약(@unique) 적절히 설정
